<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melann Lending Past Due and Report Monitoring</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --melann-emerald: #047857;
            --melann-emerald-deep: #064e3b;
            --melann-surface: #ffffff;
            --melann-border: #d8e1ea;
            --melann-muted: #64748b;
            --melann-bg: #edf3f1;
        }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.12), transparent 34rem),
                linear-gradient(135deg, #f8fafc 0%, #eef7f3 42%, #edf3f8 100%);
            color: #1e293b;
            transition: background-color 0.3s ease, color 0.3s ease;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
            text-rendering: geometricPrecision;
        }
        html.dark body {
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.12), transparent 32rem),
                linear-gradient(135deg, #07110f 0%, #0f172a 52%, #111827 100%);
            color: #f8fafc;
        }
        body::selection {
            background: rgba(16, 185, 129, 0.22);
        }
        
        /* Global UI Enhancements for Cards and Tables */
        main .bg-white:not(td):not(th) {
            box-shadow: 0 14px 35px -18px rgba(15, 23, 42, 0.24), 0 1px 2px rgba(15, 23, 42, 0.04) !important;
            border-color: var(--melann-border) !important;
            border-width: 1px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        main .bg-white:not(td):not(th):hover {
            box-shadow: 0 20px 44px -22px rgba(15, 23, 42, 0.32), 0 1px 3px rgba(15, 23, 42, 0.06) !important;
            border-color: #a9bac9 !important;
            transform: translateY(-1px);
        }
        
        /* Disable hover transform for large wrapper containers to avoid layout shifts */
        main > div > .bg-white:not(td):not(th):hover {
            transform: none;
        }
        
        html.dark main .bg-slate-800:not(td):not(th) {
            box-shadow: 0 18px 42px -20px rgba(0,0,0,0.62) !important;
            border-color: #334155 !important;
            border-width: 1px !important;
        }
        html.dark main .bg-slate-800:not(td):not(th):hover {
            border-color: #475569 !important;
        }

        /* Better contrast for inputs/selects inside main */
        main input, main select, main textarea {
            border-color: #cbd5e1 !important;
            background-color: #f8fafc !important;
            box-shadow: inset 0 1px 2px 0 rgba(0, 0, 0, 0.02) !important;
            transition: all 0.2s ease;
        }
        main input:focus, main select:focus, main textarea:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15) !important;
            background-color: #ffffff !important;
        }
        html.dark main input, html.dark main select, html.dark main textarea {
            border-color: #475569 !important;
            background-color: #0f172a !important;
        }

        button, a, input, select, textarea {
            outline-offset: 3px;
        }
        button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 3px solid rgba(16, 185, 129, 0.28);
            outline-offset: 2px;
        }
        button:not(:disabled) {
            will-change: transform;
        }
        button:not(:disabled):active {
            transform: translateY(1px) scale(0.99);
        }

        /* Table header enhancements */
        thead th {
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%) !important;
            border-bottom: 2px solid #d4dde8 !important;
            color: #475569 !important;
            letter-spacing: 0.08em;
        }
        html.dark thead th {
            background: linear-gradient(180deg, #1e293b 0%, #182233 100%) !important;
            border-bottom: 2px solid #475569 !important;
            color: #94a3b8 !important;
        }
        
        /* Make table row borders clearer */
        tbody tr td {
            border-bottom: 1px solid #e2e8f0 !important;
        }
        html.dark tbody tr td {
            border-bottom: 1px solid #334155 !important;
        }
        tbody tr {
            transition: background-color 0.18s ease, box-shadow 0.18s ease;
        }
        tbody tr:hover td {
            background-color: rgba(236, 253, 245, 0.55);
        }
        html.dark tbody tr:hover td {
            background-color: rgba(15, 118, 110, 0.12);
        }
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7d2de;
            border: 2px solid transparent;
            border-radius: 999px;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
            background-clip: padding-box;
        }
        .melann-shell-grid {
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.035) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        html.dark .melann-shell-grid {
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px);
        }
        .melann-glass-header {
            background: rgba(255, 255, 255, 0.84);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        html.dark .melann-glass-header {
            background: rgba(15, 23, 42, 0.84);
        }
        .melann-card-quiet {
            background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0));
        }
        .sticky-column {
            position: sticky;
            left: 0;
            z-index: 10;
            background: white;
        }

        /* Strict Excel-like Print Styles */
        @media print {
            @page {
                size: 8.5in 13in;
                margin: 12mm 10mm 15mm 10mm;

                /* Suppress browser auto-generated date/time, URL, title headers */
                @top-left   { content: '' !important; }
                @top-center { content: '' !important; }
                @top-right  { content: '' !important; }
                @bottom-left  { content: '' !important; }
                @bottom-right { content: '' !important; }
                /* Keep page numbers at the bottom center */
                @bottom-center {
                    content: "Page " counter(page) " of " counter(pages);
                    font-size: 8pt;
                    color: #555;
                }
            }
            body {
                background-color: white !important;
                margin: 0;
                padding: 0;
                color: black !important;
                font-family: Arial, Helvetica, sans-serif !important;
            }
            #root > div > main {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            header, aside, .no-print, .floating-action-bar, nav {
                display: none !important;
            }
            #printable-sheet {
                display: block !important;
                visibility: visible !important;
                width: 100% !important;
            }

            /* Scope table rules ONLY to printable-sheet to avoid interference */
            #printable-sheet table {
                width: 100% !important;
                border-collapse: collapse !important;
                table-layout: fixed !important;
            }
            #printable-sheet th,
            #printable-sheet td {
                border: 0.5pt solid #000 !important;
                padding: 4px 6px !important;
                font-size: 8pt !important;
                border-radius: 0 !important;
                word-wrap: break-word !important;
                text-transform: none !important;
            }

            /* Borderless override: info table in header and footer use border:none cells */
            #printable-sheet .cs-no-border th,
            #printable-sheet .cs-no-border td {
                border: none !important;
                padding: 2px 0 !important;
            }

            #printable-sheet thead {
                display: table-header-group;
            }
            #printable-sheet thead th {
                background-color: #e5e7eb !important;
                font-weight: bold !important;
                text-align: center !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            #printable-sheet tr {
                page-break-inside: avoid;
            }
            .group-row-city {
                background-color: #d1d5db !important;
                font-weight: 900 !important;
                font-size: 9pt !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .group-row-barangay {
                background-color: #e5e7eb !important;
                font-weight: bold !important;
                font-size: 8.5pt !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-border {
                border: none !important;
            }
            .underline-cell {
                border-bottom: 0.5pt solid #000 !important;
                border-top: none !important;
                border-left: none !important;
                border-right: none !important;
            }

            /* Hide the inline page number div that shows in browsers
               that support @page @bottom-center (avoid duplication) */
            .print-page-number {
                display: none !important;
            }
        }
        #printable-sheet {
            display: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
